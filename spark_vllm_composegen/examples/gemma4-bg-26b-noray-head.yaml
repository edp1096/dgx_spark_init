mode: noray-head
service: vllm-head
container_name: vllm-gemma4-head
image: ${VLLM_IMAGE:-vllm-node-tf5:latest}
hf_cache: /home/edp1096/.cache/huggingface
volumes:
  - ../../patches/gemma4_patched.py:/opt/gemma4_patched.py:ro
eth_if: enp1s0f0np0
ib_hca: rocep1s0f0,roceP2p1s0f0
head_ip: 169.254.141.58
node_ip: 169.254.141.58
num_nodes: 2
node_rank: 0
master_port: 29501
env:
  HF_TOKEN: ${HF_TOKEN}
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
  VLLM_NVFP4_GEMM_BACKEND: FLASHINFER_CUTLASS
pre_commands:
  - cp /opt/gemma4_patched.py /usr/local/lib/python3.12/dist-packages/vllm/model_executor/models/gemma4.py
model: bg-digitalservices/Gemma-4-26B-A4B-it-NVFP4
serve_args:
  - --host
  - 0.0.0.0
  - --port
  - "8000"
  - --distributed-executor-backend
  - ray
  - --tensor-parallel-size
  - "2"
  - --max-model-len
  - "262144"
  - --max-num-seqs
  - "4"
  - --gpu-memory-utilization
  - "0.70"
  - --quantization
  - modelopt
  - --dtype
  - auto
  - --kv-cache-dtype
  - fp8
  - --max-num-batched-tokens
  - "8192"
  - --moe-backend
  - marlin
  - --attention-backend
  - TRITON_ATTN
  - --enable-prefix-caching
  - --enable-auto-tool-choice
  - --tool-call-parser
  - gemma4
  - --reasoning-parser
  - gemma4
  - --trust-remote-code
