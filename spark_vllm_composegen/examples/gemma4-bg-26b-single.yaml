mode: single
service: vllm
container_name: vllm-gemma4
image: ${VLLM_IMAGE:-vllm-node-tf5:latest}
hf_cache: /home/edp1096/.cache/huggingface
volumes:
  - ../patches/gemma4_patched.py:/opt/gemma4_patched.py:ro
env:
  HF_TOKEN: ${HF_TOKEN}
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
  VLLM_NVFP4_GEMM_BACKEND: FLASHINFER_CUTLASS
pre_commands:
  - cp /opt/gemma4_patched.py /usr/local/lib/python3.12/dist-packages/vllm/model_executor/models/gemma4.py
model: bg-digitalservices/Gemma-4-26B-A4B-it-NVFP4
serve_args:
  - --host
  - 0.0.0.0
  - --port
  - "8000"
  - --tensor-parallel-size
  - "1"
  - --max-model-len
  - "262144"
  - --max-num-seqs
  - "4"
  - --gpu-memory-utilization
  - "0.70"
  - --quantization
  - modelopt
  - --dtype
  - auto
  - --kv-cache-dtype
  - fp8
  - --max-num-batched-tokens
  - "8192"
  - --moe-backend
  - marlin
  - --attention-backend
  - TRITON_ATTN
  - --enable-prefix-caching
  - --enable-auto-tool-choice
  - --tool-call-parser
  - gemma4
  - --reasoning-parser
  - gemma4
  - --trust-remote-code
