services:
  zit-ui:
    container_name: zit-ui-spark-builder
    image: nvcr.io/nvidia/pytorch:26.02-py3
    environment:
      - PIP_ROOT_USER_ACTION=ignore
      - GITHUB_RAW=https://raw.githubusercontent.com/edp1096/dgx_spark_init/main/compose_yaml/zit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    entrypoint: >
      /bin/bash -c "

      mkdir -p ~/zit-ui/app/ui/videox_models ~/zit-ui/app/ui/preprocessors/dwpose_utils ~/zit-ui/app/ui/preprocessors/zoe ~/zit-ui/logs;

      ZIMAGE_COMMIT=26f23ed;

      echo '=== [1/7] Cloning Z-Image repo ===';
      if [ ! -d ~/zit-ui/Z-Image ]; then
        git clone https://github.com/Tongyi-MAI/Z-Image.git ~/zit-ui/Z-Image;
        cd ~/zit-ui/Z-Image && git checkout $${ZIMAGE_COMMIT} && cd ~;
      fi;

      echo '=== [2/7] Installing Z-Image ===';
      cd ~/zit-ui/Z-Image && pip install -q -e . --no-deps;
      cd ~/zit-ui;

      echo '=== [3/7] Downloading UI files ===';
      curl -sfL $${GITHUB_RAW}/app/app.py -o ~/zit-ui/app/app.py;
      for f in zit_config.py pipeline_manager.py worker.py generators.py download_models.py i18n.py face_swap.py; do
        curl -sfL $${GITHUB_RAW}/app/ui/$$f -o ~/zit-ui/app/ui/$$f;
      done;

      echo '  Downloading videox_models/';
      for f in __init__.py attention_kernel.py attention_utils.py fp8_optimization.py pipeline_z_image_control.py z_image_transformer2d.py z_image_transformer2d_control.py; do
        curl -sfL $${GITHUB_RAW}/app/ui/videox_models/$$f -o ~/zit-ui/app/ui/videox_models/$$f;
      done;

      echo '  Downloading preprocessors/';
      for f in __init__.py canny.py depth.py dwpose.py gray.py hed.py; do
        curl -sfL $${GITHUB_RAW}/app/ui/preprocessors/$$f -o ~/zit-ui/app/ui/preprocessors/$$f;
      done;
      for f in __init__.py onnxdet.py onnxpose.py wholebody.py util.py; do
        curl -sfL $${GITHUB_RAW}/app/ui/preprocessors/dwpose_utils/$$f -o ~/zit-ui/app/ui/preprocessors/dwpose_utils/$$f;
      done;

      echo '=== [4/7] Python packages ===';
      pip install -q gradio accelerate safetensors huggingface_hub psutil loguru einops fire transformers peft timm diffusers sentencepiece opencv-python-headless;

      echo '=== [5/7] q8_kernels (aarch64 FP8 GEMM) ===';
      Q8_WHEEL_URL=https://raw.githubusercontent.com/edp1096/dgx_spark_init/main/compose_yaml/ltx-2.3/builder/q8_kernels-0.0.5-cp312-cp312-linux_aarch64.whl;
      if ! python3 -c 'import q8_kernels' 2>/dev/null; then
        pip install -q $$Q8_WHEEL_URL;
      else
        echo '  q8_kernels already installed';
      fi;

      echo '=== [6/7] bitsandbytes (source build for aarch64) ===';
      BNB_COMMIT=925d83e;
      if ! python3 -c 'import bitsandbytes' 2>/dev/null; then
        git clone --depth 250 https://github.com/bitsandbytes-foundation/bitsandbytes.git /tmp/bnb-src && cd /tmp/bnb-src && git checkout $${BNB_COMMIT} && cd ~;
        cd /tmp/bnb-src && cmake -DCOMPUTE_BACKEND=cuda -DCOMPUTE_CAPABILITY=121 -S . -B build && cmake --build build -j$$(nproc) && pip install -q . && cd ~;
        rm -rf /tmp/bnb-src;
      else
        echo '  bitsandbytes already installed';
      fi;

      echo '=== [7/7] ZoeDepth preprocessor (from VideoX-Fun, large tree) ===';
      echo '  Note: ZoeDepth zoe/ directory should be downloaded via update.sh or manually copied';

      python3 -c \"import torch; print(f'torch: {torch.__version__}')\" ;
      python3 -c \"import torch; print(f'CUDA: {torch.cuda.is_available()}, {torch.cuda.get_device_name(0)}')\" ;
      python3 -c \"import gradio; print(f'gradio: {gradio.__version__}')\" ;
      python3 -c \"import zimage; print('zimage: ok')\" ;
      python3 -c \"import timm; print(f'timm: {timm.__version__}')\" ;
      python3 -c \"import q8_kernels; print('q8_kernels: ok')\" ;
      python3 -c \"import bitsandbytes; print(f'bitsandbytes: {bitsandbytes.__version__}')\" ;
      rm -rf /root/.cache/pip;

      echo '=== Build complete! ===' ;
      tail -f /dev/null
      "
