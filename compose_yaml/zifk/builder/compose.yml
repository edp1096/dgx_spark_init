services:
  zifk-ui:
    container_name: zifk-ui-spark-builder
    image: nvcr.io/nvidia/pytorch:26.02-py3
    environment:
      - PIP_ROOT_USER_ACTION=ignore
      - GITHUB_RAW=https://raw.githubusercontent.com/edp1096/dgx_spark_init/main/compose_yaml/zifk
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    entrypoint: >
      /bin/bash -c "

      mkdir -p ~/zifk-ui/app/ui ~/zifk-ui/logs;

      echo '=== [1/6] Cloning source repos ===';
      if [ ! -d ~/zifk-ui/Z-Image ]; then
        git clone https://github.com/Tongyi-MAI/Z-Image.git ~/zifk-ui/Z-Image;
      fi;
      if [ ! -d ~/zifk-ui/flux2 ]; then
        git clone https://github.com/black-forest-labs/flux2.git ~/zifk-ui/flux2;
      fi;

      echo '=== [2/6] Installing source repos ===';
      cd ~/zifk-ui/Z-Image && pip install -q -e . --no-deps;
      cd ~/zifk-ui/flux2 && pip install -q -e . --no-deps;
      cd ~/zifk-ui;

      echo '=== [3/6] Downloading UI files ===';
      curl -sfL $${GITHUB_RAW}/app/app.py -o ~/zifk-ui/app/app.py;
      for f in zifk_config.py pipeline_manager.py worker.py generators.py download_models.py i18n.py; do
        curl -sfL $${GITHUB_RAW}/app/ui/$$f -o ~/zifk-ui/app/ui/$$f;
      done;

      echo '=== [4/6] Python packages ===';
      pip install -q gradio accelerate safetensors huggingface_hub psutil loguru einops fire transformers peft;

      echo '=== [5/6] q8_kernels (aarch64 FP8 GEMM) ===';
      Q8_WHEEL_URL=https://raw.githubusercontent.com/edp1096/dgx_spark_init/main/compose_yaml/ltx-2.3/builder/q8_kernels-0.0.5-cp312-cp312-linux_aarch64.whl;
      if ! python3 -c 'import q8_kernels' 2>/dev/null; then
        pip install -q $$Q8_WHEEL_URL;
      else
        echo '  q8_kernels already installed';
      fi;

      echo '=== [6/6] bitsandbytes (source build for aarch64) ===';
      BNB_COMMIT=925d83e;
      if ! python3 -c 'import bitsandbytes' 2>/dev/null; then
        git clone --depth 250 https://github.com/bitsandbytes-foundation/bitsandbytes.git /tmp/bnb-src && cd /tmp/bnb-src && git checkout $${BNB_COMMIT} && cd ~;
        cd /tmp/bnb-src && cmake -DCOMPUTE_BACKEND=cuda -DCOMPUTE_CAPABILITY=121 -S . -B build && cmake --build build -j$$(nproc) && pip install -q . && cd ~;
        rm -rf /tmp/bnb-src;
      else
        echo '  bitsandbytes already installed';
      fi;

      python3 -c \"import torch; print(f'torch: {torch.__version__}')\" ;
      python3 -c \"import torch; print(f'CUDA: {torch.cuda.is_available()}, {torch.cuda.get_device_name(0)}')\" ;
      python3 -c \"import gradio; print(f'gradio: {gradio.__version__}')\" ;
      python3 -c \"import zimage; print('zimage: ok')\" ;
      python3 -c \"import flux2; print('flux2: ok')\" ;
      python3 -c \"import q8_kernels; print('q8_kernels: ok')\" ;
      python3 -c \"import bitsandbytes; print(f'bitsandbytes: {bitsandbytes.__version__}')\" ;
      rm -rf /root/.cache/pip;

      echo '=== Build complete! ===' ;
      tail -f /dev/null
      "
