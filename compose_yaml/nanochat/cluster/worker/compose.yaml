services:
  nanochat-worker:
    container_name: nanochat-worker
    image: nvcr.io/nvidia/pytorch:26.02-py3
    network_mode: "host"
    ipc: "host"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864
    devices:
      - "/dev/infiniband:/dev/infiniband"
    volumes:
      - "/home/edp1096/.cache/huggingface:/root/.cache/huggingface"
      - "/home/edp1096/.cache/nanochat:/root/.cache/nanochat"
      - "/home/edp1096/workspace/dataset/fineweb-edu-100b:/root/.cache/nanochat/base_data"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - PIP_ROOT_USER_ACTION=ignore
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - MASTER_ADDR=169.254.141.58
      - MASTER_PORT=12345
      - NCCL_SOCKET_IFNAME=enp1s0f0np0
      - GLOO_SOCKET_IFNAME=enp1s0f0np0
      # - NCCL_IB_HCA=rocep1s0f0,roceP2p1s0f0
      # - NCCL_IB_GID_INDEX=3
      - NCCL_IB_CUDA_SUPPORT=1
      - NCCL_NET_GDR_LEVEL=PHB
      - NCCL_DEBUG=INFO
      - WANDB_MODE=offline
      - WANDB_MODE=disabled
    working_dir: /root
    # stdin_open: true
    # tty: true
    # command: /bin/bash
    command:
      - bash
      - -c
      - |
        git clone https://github.com/karpathy/nanochat.git && cd nanochat &&
        sed -i 's/(\["5090"\], 209.5e12),/(["gb10"], 100e12),\n        (["5090"], 209.5e12),/' nanochat/common.py &&
        pip install -U pandas pyarrow wandb tokenizers tiktoken rustbpe &&

        python -m nanochat.dataset -n 240 &&
        python -m scripts.tok_train &&
        python -m scripts.tok_eval &&

        torchrun \
          --nproc_per_node=1 \
          --nnodes=2 \
          --node_rank=1 \
          --master_addr=169.254.141.58 \
          --master_port=12345 \
          -m scripts.base_train -- \
          --depth=20 \
          --device-batch-size=32 \
          --window-pattern=L \
          --fp8 \
          --run=nanochat-2spark