# ============================================================
# Nanochat - 데이터 사전 다운로드 + 토크나이저 학습
# ============================================================
# 양쪽 노드에서 각각 1회 실행

services:
  download:
    container_name: nanochat-download
    image: nvcr.io/nvidia/pytorch:26.02-py3
    network_mode: host
    ipc: host
    ulimits:
      memlock: { soft: -1, hard: -1 }
      stack: { soft: 67108864, hard: 67108864 }
    volumes:
      - /home/edp1096/.cache/huggingface:/root/.cache/huggingface       # HuggingFace 캐시
      - /home/edp1096/.cache/nanochat:/root/.cache/nanochat             # 체크포인트, 데이터, 토크나이저
      - /home/edp1096/workspace/nanochat:/root/nanochat                 # nanochat 소스코드
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      PIP_ROOT_USER_ACTION: ignore
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      TORCHINDUCTOR_COMPILE_THREADS: "1"
      WANDB_MODE: disabled
    working_dir: /root/nanochat
    command:
      - bash
      - -c
      - |
        if [ ! -d /root/nanochat/.git ]; then
          git clone https://github.com/karpathy/nanochat.git /root/nanochat
        fi &&
        cd /root/nanochat &&
        sed -i '/\["gb10"\]/!s/(\["5090"\], 209.5e12),/(["gb10"], 100e12),\n        (["5090"], 209.5e12),/' nanochat/common.py &&
        cp -n nanochat/flash_attention.py nanochat/flash_attention_original.py &&
        curl -sL https://raw.githubusercontent.com/edp1096/dgx_spark_init/refs/heads/main/compose_yaml/nanochat/flash_attention_patch.py -o nanochat/flash_attention.py &&

        pip install -U pandas pyarrow wandb tokenizers tiktoken rustbpe datasets &&

        echo "=== [1/5] pretrain 데이터셋 ===" &&
        python -m nanochat.dataset -n 240 &&

        echo "=== [2/5] 토크나이저 학습/평가 ===" &&
        python -m scripts.tok_train &&
        python -m scripts.tok_eval &&

        echo "=== [3/5] SFT 데이터 ===" &&
        curl -sL https://karpathy-public.s3.us-west-2.amazonaws.com/identity_conversations.jsonl -o /root/.cache/nanochat/identity_conversations.jsonl &&

        echo "=== [4/5] base_eval (CORE) 데이터 ===" &&
        python -c "from nanochat.common import download_file_with_lock; download_file_with_lock('https://karpathy-public.s3.us-west-2.amazonaws.com/eval_bundle.zip', 'eval_bundle.zip')" &&
        python -c "from nanochat.common import download_file_with_lock; download_file_with_lock('https://raw.githubusercontent.com/dwyl/english-words/refs/heads/master/words_alpha.txt', 'words_alpha.txt')" &&

        echo "=== [5/5] chat_eval (ChatCORE) 데이터 ===" &&
        python -c "
        from datasets import load_dataset
        load_dataset('allenai/ai2_arc', 'ARC-Easy', split='test')
        load_dataset('allenai/ai2_arc', 'ARC-Challenge', split='test')
        load_dataset('cais/mmlu', 'all', split='test')
        load_dataset('openai/gsm8k', 'main', split='test')
        load_dataset('openai/openai_humaneval', split='test')
        " &&

        echo "=== 완료 ==="
