# ============================================================
# Nanochat - Interactive Shell (chat_cli 등 수동 실행)
# ============================================================

services:
  shell:
    container_name: nanochat-shell
    image: nvcr.io/nvidia/pytorch:26.02-py3
    network_mode: host
    ipc: host
    ulimits:
      memlock: { soft: -1, hard: -1 }
      stack: { soft: 67108864, hard: 67108864 }
    devices:
      - /dev/infiniband:/dev/infiniband
    volumes:
      - /home/edp1096/.cache/huggingface:/root/.cache/huggingface       # HuggingFace 캐시
      - /home/edp1096/.cache/nanochat:/root/.cache/nanochat             # 체크포인트, 데이터, 토크나이저
      - /home/edp1096/workspace/nanochat:/root/nanochat                 # nanochat 소스코드
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      PIP_ROOT_USER_ACTION: ignore
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      TORCHINDUCTOR_COMPILE_THREADS: "1"
      WANDB_MODE: disabled
    working_dir: /root/nanochat
    stdin_open: true
    tty: true
    command: bash -c "pip install -U pandas pyarrow wandb tokenizers tiktoken rustbpe && bash"
