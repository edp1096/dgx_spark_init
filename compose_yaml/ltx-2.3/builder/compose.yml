services:
  ltx2-ui:
    container_name: ltx2-ui
    image: nvcr.io/nvidia/pytorch:26.02-py3
    ports:
      - "7860:7860"
    environment:
      - PIP_ROOT_USER_ACTION=ignore
    volumes:
      - "/home/edp1096/.cache/huggingface:/root/.cache/huggingface"
      - "/home/edp1096/workspace/ltx2-ui:/root/ltx2-ui"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    stdin_open: true
    tty: true
