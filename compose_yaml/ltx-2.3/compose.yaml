services:
  ltx2-ui:
    container_name: ltx2-ui-spark
    image: edp1096/ltx2-ui-spark:2.3-arm64
    ports:
      - "7860:7860"
    environment:
      - PIP_ROOT_USER_ACTION=ignore
    volumes:
      - "/home/edp1096/.cache/huggingface:/root/.cache/huggingface"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # stdin_open: true
    # tty: true
    command: >
      /bin/bash -c "
      cd ~/ltx2-ui/LTX-2 &&
      python download_models.py &&
      PYTHONUNBUFFERED=1 python app.py --server-name 0.0.0.0
      "