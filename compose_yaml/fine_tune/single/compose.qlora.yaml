# Llama 3.2 3B QLoRA Fine-tuning (Single Node)
# 4bit 양자화 + LoRA (가장 빠름, 최소 메모리)
#
# docker compose -f compose.qlora.yaml up

services:
  qlora:
    image: "nvcr.io/nvidia/pytorch:26.02-py3"
    container_name: ft-3b-qlora
    network_mode: "host"
    ipc: "host"
    volumes:
      - "/home/edp1096/.cache/huggingface:/root/.cache/huggingface"
      - "/home/edp1096/workspace/finetune/scripts:/workspace/scripts"
      - "/home/edp1096/workspace/finetune/output:/workspace/output"
      - "/home/edp1096/workspace/finetune/logs:/workspace/logs"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - BNB_CUDA_VERSION=130
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "=========================================="
        echo " Installing dependencies..."
        echo "=========================================="
        pip install transformers "trl>=0.25.1" peft "bitsandbytes>=0.48.2"

        echo "=========================================="
        echo " Starting Llama 3.2 3B QLoRA Fine-tuning"
        echo "=========================================="
        python /workspace/scripts/Llama3_qLoRA_finetuning.py \
          --model_name meta-llama/Llama-3.2-3B-Instruct \
          --batch_size 8 \
          --seq_length 2048 \
          --num_epochs 1 \
          --learning_rate 1e-4 \
          --lora_rank 8 \
          --dataset_size 512 \
          --gradient_checkpointing \
          --output_dir /workspace/output/llama3-3b-qlora \
          --log_dir /workspace/logs

        echo "=========================================="
        echo " Done! Output: /workspace/output/llama3-3b-qlora"
        echo "=========================================="
