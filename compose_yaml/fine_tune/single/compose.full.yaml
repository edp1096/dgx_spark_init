# Llama 3.2 3B Full SFT Fine-tuning (Single Node)
# 모든 파라미터 학습 (가장 느림, 최고 품질)
#
# docker compose -f compose.full.yaml up

services:
  full-sft:
    image: "nvcr.io/nvidia/pytorch:26.02-py3"
    container_name: ft-3b-full-sft
    network_mode: "host"
    ipc: "host"
    volumes:
      - "/home/edp1096/.cache/huggingface:/root/.cache/huggingface"
      - "/home/edp1096/workspace/finetune/scripts:/workspace/scripts"
      - "/home/edp1096/workspace/finetune/output:/workspace/output"
      - "/home/edp1096/workspace/finetune/logs:/workspace/logs"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "=========================================="
        echo " Installing dependencies..."
        echo "=========================================="
        pip install transformers "trl>=0.25.1"

        echo "=========================================="
        echo " Starting Llama 3.2 3B Full Fine-tuning"
        echo "=========================================="
        python /workspace/scripts/Llama3_full_finetuning.py \
          --model_name meta-llama/Llama-3.2-3B-Instruct \
          --batch_size 8 \
          --seq_length 2048 \
          --num_epochs 1 \
          --learning_rate 5e-5 \
          --dataset_size 512 \
          --gradient_checkpointing \
          --output_dir /workspace/output/llama3-3b-full-sft \
          --log_dir /workspace/logs

        echo "=========================================="
        echo " Done! Output: /workspace/output/llama3-3b-full-sft"
        echo "=========================================="
